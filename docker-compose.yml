version: '3.8'

services:
  api:
    build: .
    container_name: ai_infographic_api
    ports:
      - "8500:8000"
    depends_on:
      - db
      - redis
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql+asyncpg://postgres:password@db:5432/infographic_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
      - ./media:/app/media
    restart: unless-stopped

  worker:
    build: .
    container_name: ai_infographic_worker
    command: ["celery", "-A", "app.worker.celery_app", "worker", "-Q", "main-queue,celery", "-l", "info", "-P", "threads"]
    depends_on:
      - db
      - redis
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql+asyncpg://postgres:password@db:5432/infographic_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./media:/app/media
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ai_infographic_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: infographic_db
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_infographic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
